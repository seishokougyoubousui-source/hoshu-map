<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → 画像変換</title>
<style>
  :root {
    --bg: #f5f3ef;
    --panel: #1c1c2e;
    --accent: #4f8ef7;
    --gold: #f5a623;
    --text: #1c1c2e;
    --border: #ddd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    color: var(--text);
  }

  header {
    width: 100%;
    max-width: 700px;
    margin-bottom: 24px;
    text-align: center;
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--panel);
    letter-spacing: 0.04em;
  }
  header h1 span { color: var(--accent); }
  header p { font-size: 13px; color: #888; margin-top: 6px; }

  /* ドロップゾーン */
  .drop-zone {
    width: 100%;
    max-width: 700px;
    border: 2.5px dashed #bbb;
    border-radius: 20px;
    background: white;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #f0f5ff;
  }
  .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-zone p { font-size: 15px; color: #555; }
  .drop-zone small { font-size: 12px; color: #aaa; margin-top: 4px; display: block; }

  #pdfInput { display: none; }

  /* 設定パネル */
  .settings {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .settings h3 { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 0.1em; margin-bottom: 14px; }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .setting-row label { min-width: 80px; color: #555; }
  .setting-row select, .setting-row input[type=range] {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
  }
  .setting-row input[type=range] { padding: 0; }
  .setting-row span { font-size: 13px; color: #888; min-width: 40px; }

  /* 変換ボタン */
  .convert-btn {
    width: 100%;
    max-width: 700px;
    padding: 16px;
    background: var(--panel);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    margin-bottom: 24px;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .convert-btn:hover { background: #2a2a4a; }
  .convert-btn:active { transform: scale(0.98); }
  .convert-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* プログレス */
  .progress-bar {
    width: 100%;
    max-width: 700px;
    background: #e0e0e0;
    border-radius: 8px;
    height: 8px;
    display: none;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 8px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    width: 100%;
    max-width: 700px;
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
    display: none;
  }

  /* 結果グリッド */
  .result-grid {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .result-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  .result-card:hover { transform: translateY(-2px); }
  .result-card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: #f8f8f8;
    border-bottom: 1px solid #eee;
    display: block;
  }
  .result-card-body {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-card-body span { font-size: 12px; color: #888; }
  .dl-btn {
    padding: 6px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dl-btn:active { transform: scale(0.95); }

  /* 全ページDLボタン */
  .dl-all-btn {
    width: 100%;
    max-width: 700px;
    padding: 14px;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    display: none;
    transition: all 0.2s;
  }
  .dl-all-btn:active { transform: scale(0.98); }

  .notice {
    width: 100%;
    max-width: 700px;
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: #795548;
    margin-bottom: 20px;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <h1>PDF <span>→</span> 画像変換</h1>
  <p>ブラウザ完結・外部送信なし・完全無料</p>
</header>

<div class="notice">
  ⚠️ このツールはインターネット接続不要で動作します。PDFデータが外部に送信されることは一切ありません。
</div>

<!-- ドロップゾーン -->
<div class="drop-zone" id="dropZone" onclick="document.getElementById('pdfInput').click()">
  <div class="icon">📄</div>
  <p>PDFをここにドラッグ＆ドロップ<br>またはタップして選択</p>
  <small>対応形式：PDF</small>
</div>
<input type="file" id="pdfInput" accept="application/pdf" onchange="handleFile(event)">

<!-- 設定 -->
<div class="settings" id="settings">
  <h3>変換設定</h3>
  <div class="setting-row">
    <label>画質（DPI）</label>
    <input type="range" id="dpiRange" min="72" max="300" value="150" step="1"
      oninput="document.getElementById('dpiVal').textContent=this.value">
    <span id="dpiVal">150</span> DPI
  </div>
  <div class="setting-row">
    <label>形式</label>
    <select id="formatSelect">
      <option value="image/jpeg">JPEG（小さい）</option>
      <option value="image/png" selected>PNG（高品質）</option>
    </select>
  </div>
</div>

<!-- 変換ボタン -->
<button class="convert-btn" id="convertBtn" onclick="convertAll()">🔄 変換開始</button>

<!-- プログレス -->
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText"></div>

<!-- 結果 -->
<div class="result-grid" id="resultGrid"></div>
<button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()">⬇️ 全ページをまとめてダウンロード</button>

<script>
// PDF.jsをインライン（ブラウザのCanvas APIで描画）
// PDF.jsがない場合は独自実装にフォールバック

let pdfFile = null;
let convertedImages = [];

// ===== ドラッグ&ドロップ =====
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processFile(file);
  else alert('PDFファイルを選択してください');
});

function handleFile(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
  e.target.value = '';
}

function processFile(file) {
  pdfFile = file;
  dropZone.querySelector('p').textContent = `📄 ${file.name}`;
  dropZone.querySelector('small').textContent = `${(file.size / 1024 / 1024).toFixed(1)} MB`;
  document.getElementById('settings').style.display = 'block';
  document.getElementById('convertBtn').style.display = 'block';
  document.getElementById('resultGrid').innerHTML = '';
  document.getElementById('dlAllBtn').style.display = 'none';
  convertedImages = [];
}

// ===== 変換処理 =====
async function convertAll() {
  if (!pdfFile) return;

  const btn = document.getElementById('convertBtn');
  btn.disabled = true;
  btn.textContent = '変換中...';

  const dpi = parseInt(document.getElementById('dpiRange').value);
  const format = document.getElementById('formatSelect').value;
  const scale = dpi / 72;

  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressText').style.display = 'block';
  document.getElementById('resultGrid').innerHTML = '';
  document.getElementById('dlAllBtn').style.display = 'none';
  convertedImages = [];

  try {
    // PDF.jsを動的ロード（ローカルファイルとして存在する場合）
    if (typeof pdfjsLib === 'undefined') {
      // PDF.jsなし → ブラウザのiframe経由でキャンバスに描画
      await convertViaBrowser(format, scale);
    } else {
      await convertViaPdfjs(format, scale, dpi);
    }
  } catch(e) {
    await convertViaBrowser(format, scale);
  }

  btn.disabled = false;
  btn.textContent = '🔄 変換開始';
}

// PDF.js使用版
async function convertViaPdfjs(format, scale, dpi) {
  const arrayBuffer = await pdfFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const total = pdf.numPages;

  for (let i = 1; i <= total; i++) {
    setProgress(i, total, `ページ ${i} / ${total} を変換中...`);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    const ext = format === 'image/png' ? 'png' : 'jpg';
    const dataUrl = canvas.toDataURL(format, 0.92);
    convertedImages.push({ dataUrl, name: `page_${String(i).padStart(3,'0')}.${ext}` });
    addResultCard(dataUrl, i, total, `page_${String(i).padStart(3,'0')}.${ext}`);
  }

  finishConvert();
}

// ブラウザiframe版（PDF.jsなし・簡易版）
async function convertViaBrowser(format, scale) {
  // ObjectURL経由でiframeに表示してキャプチャ
  alert('PDF.jsが利用できないため、1ページ目のみプレビュー表示します。\n完全な変換には補修図面アプリと組み合わせてご利用ください。');

  const objectUrl = URL.createObjectURL(pdfFile);
  const iframe = document.createElement('iframe');
  iframe.src = objectUrl;
  iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:800px;height:1200px;';
  document.body.appendChild(iframe);

  await new Promise(r => setTimeout(r, 2000));

  // iframeからの直接キャプチャはセキュリティ制限があるため
  // ユーザーにスクリーンショットを促す
  document.body.removeChild(iframe);
  URL.revokeObjectURL(objectUrl);

  setProgress(1, 1, '完了');
  document.getElementById('progressText').textContent =
    '⚠️ PDF.jsなしでは自動変換できません。スクリーンショットをお試しください。';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('convertBtn').disabled = false;
  document.getElementById('convertBtn').textContent = '🔄 変換開始';
}

function setProgress(current, total, text) {
  const pct = Math.round((current / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function addResultCard(dataUrl, pageNum, total, filename) {
  const grid = document.getElementById('resultGrid');
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <img src="${dataUrl}" alt="ページ ${pageNum}">
    <div class="result-card-body">
      <span>ページ ${pageNum} / ${total}</span>
      <button class="dl-btn" onclick="downloadOne('${filename}', '${dataUrl}')">⬇️ DL</button>
    </div>`;
  grid.appendChild(card);
}

function finishConvert() {
  setProgress(1, 1, `✅ 変換完了！${convertedImages.length}ページ`);
  if (convertedImages.length > 1) {
    document.getElementById('dlAllBtn').style.display = 'block';
  }
}

function downloadOne(filename, dataUrl) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

async function downloadAll() {
  for (let i = 0; i < convertedImages.length; i++) {
    const { dataUrl, name } = convertedImages[i];
    await new Promise(r => setTimeout(r, 300));
    downloadOne(name, dataUrl);
  }
}
</script>
</body>
</html>
